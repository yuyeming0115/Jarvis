<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Jarvis Workbench V3</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Local Jarvis V3.3</p>
        <h1>Jarvis Workbench</h1>
      </div>
      <div class="top-actions">
        <span id="llmStatus" class="status-pill warn">AI 未配置</span>
        <span id="safeModeBadge" class="status-pill">安全模式</span>
        <span id="accessBadge" class="status-pill">本机访问</span>
      </div>
    </header>

    <main>
      <section class="summary-grid" aria-label="系统总览">
        <article class="metric clickable" data-main-tab="tasks">
          <span>今日任务</span>
          <strong id="taskCount">0</strong>
        </article>
        <article class="metric clickable" data-main-tab="ideas">
          <span>灵感记录</span>
          <strong id="ideaCount">0</strong>
        </article>
        <article class="metric clickable" data-main-tab="topics">
          <span>候选选题</span>
          <strong id="topicCount">0</strong>
        </article>
        <article class="metric clickable" data-main-tab="drafts">
          <span>内容草稿</span>
          <strong id="draftCount">0</strong>
        </article>
        <article class="metric clickable" data-main-tab="wiki">
          <span>知识库</span>
          <strong id="wikiCount">0</strong>
        </article>
        <article class="metric clickable" data-main-tab="media">
          <span>多媒体</span>
          <strong id="mediaCount">0</strong>
        </article>
      </section>

      <section id="errorPanel" class="notice hidden" role="alert"></section>
      <section id="toastPanel" class="notice success hidden" role="status"></section>

      <section class="workspace-grid">
        <section class="panel panel-tasks main-panel" data-panel="tasks">
          <div class="panel-header">
            <h2>任务 & 快速录入</h2>
            <span id="urgentCount" class="counter">0 紧急</span>
          </div>
          <div class="form-grid-compact">
            <form id="taskForm" class="entry-form compact">
              <label><span>新增任务</span><input name="title" type="text" placeholder="周五交 Q3 方案" required></label>
              <label><span>截止</span><input name="due_at" type="text" placeholder="2026-07-05 18:00"></label>
              <label><span>优先级</span><select name="priority"><option>P0</option><option>P1</option><option selected>P2</option><option>P3</option></select></label>
              <button type="submit">+ 任务</button>
            </form>
          </div>
          <div id="tasksList" class="stack"></div>
        </section>

        <section class="panel panel-center main-panel" data-panel="ideas">
          <div class="panel-header">
            <h2>灵感池</h2>
          </div>
          <div class="form-grid-compact">
            <form id="ideaForm" class="entry-form compact">
              <label><span>记录灵感</span><textarea name="raw_text" rows="2" placeholder="记录一个想法..." required></textarea></label>
              <label><span>类型</span><input name="type" type="text" placeholder="灵感"></label>
              <button type="submit">+ 灵感</button>
            </form>
          </div>
          <div id="ideasList" class="stack"></div>
        </section>

        <section class="panel main-panel" data-panel="topics">
          <div class="panel-header">
            <h2>选题池</h2>
          </div>
          <div class="form-grid-compact">
            <form id="topicForm" class="entry-form compact">
              <label><span>新增选题</span><input name="title" type="text" placeholder="普通人如何用 AI Agent" required></label>
              <label><span>平台</span><select name="platform"><option>公众号</option><option>小红书</option><option>视频号</option></select></label>
              <label><span>角度</span><input name="angle" type="text" placeholder="切入角度"></label>
              <button type="submit">+ 选题</button>
            </form>
          </div>
          <div id="topicsList" class="stack"></div>
        </section>

        <section class="panel main-panel hidden" data-panel="drafts">
          <div class="panel-header">
            <h2>内容草稿</h2>
            <div class="header-actions">
              <select id="draftPlatform"><option>公众号</option><option>小红书</option><option>视频号脚本</option><option>通用文章</option></select>
              <button id="newDraftBtn" type="button">+ 新草稿</button>
            </div>
          </div>
          <div id="draftsList" class="stack"></div>
        </section>

        <section class="panel main-panel hidden" data-panel="wiki">
          <div class="panel-header">
            <h2>知识库</h2>
            <div class="header-actions">
              <input id="wikiSearch" type="text" placeholder="搜索知识库...">
              <button id="newWikiBtn" type="button">+ 新文章</button>
            </div>
          </div>
          <div id="wikiList" class="stack"></div>
        </section>

        <section class="panel main-panel hidden" data-panel="media">
          <div class="panel-header">
            <h2>多媒体提示词</h2>
            <span id="mediaCountBadge" class="counter">0 条</span>
          </div>
          <div id="mediaList" class="stack"></div>
        </section>

        <aside class="side-column">
          <section class="panel" id="detailPanel">
            <div class="panel-header">
              <h2>详情 & AI 工具</h2>
            </div>
            <div id="detailContent" class="detail-content">
              <p class="empty-hint">点击选题/草稿可查看详情，或使用 AI 生成功能。</p>
            </div>
          </section>

          <section class="panel">
            <div class="panel-header">
              <h2>服务状态</h2>
              <span id="workbenchState" class="counter">checking</span>
            </div>
            <div id="statusList" class="status-list"></div>
          </section>

          <section class="panel logs-panel-compact">
            <div class="panel-header">
              <h2>运行日志</h2>
              <span id="logCount" class="counter">0 条</span>
            </div>
            <div id="logsList" class="logs-list compact"></div>
          </section>
        </aside>
      </section>
    </main>

    <div id="modalOverlay" class="modal-overlay hidden">
      <div class="modal">
        <div class="modal-header">
          <h3 id="modalTitle">标题</h3>
          <button type="button" id="modalClose" class="modal-close">&times;</button>
        </div>
        <div id="modalBody" class="modal-body"></div>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
