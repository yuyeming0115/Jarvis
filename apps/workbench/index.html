<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Jarvis Workbench V3.3</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Local Jarvis V3.3</p>
        <h1>Jarvis Workbench</h1>
      </div>
      <div class="top-actions">
        <span id="llmStatus" class="status-pill warn">AI 未配置</span>
        <span id="safeModeBadge" class="status-pill">安全模式</span>
        <span id="accessBadge" class="status-pill">本机访问</span>
        <button type="button" id="settingsBtn" class="icon-btn" title="设置" onclick="showSettings()">⚙️</button>
      </div>
    </header>

    <main>
      <section class="summary-grid" aria-label="系统总览">
        <article class="metric clickable active" data-main-tab="tasks">
          <span>今日任务</span>
          <strong id="taskCount">0</strong>
        </article>
        <article class="metric clickable" data-main-tab="ideas">
          <span>灵感记录</span>
          <strong id="ideaCount">0</strong>
        </article>
        <article class="metric clickable" data-main-tab="topics">
          <span>候选选题</span>
          <strong id="topicCount">0</strong>
        </article>
        <article class="metric clickable" data-main-tab="drafts">
          <span>内容草稿</span>
          <strong id="draftCount">0</strong>
        </article>
        <article class="metric clickable" data-main-tab="wiki">
          <span>知识库</span>
          <strong id="wikiCount">0</strong>
        </article>
        <article class="metric clickable" data-main-tab="media">
          <span>多媒体</span>
          <strong id="mediaCount">0</strong>
        </article>
      </section>

      <section id="errorPanel" class="notice hidden" role="alert"></section>
      <section id="toastPanel" class="notice success hidden" role="status"></section>

      <section class="workspace-grid">
        <section class="panel list-panel" id="listPanel">
          <div class="panel-header" id="listHeader">
            <h2 id="listTitle">任务 &amp; 快速录入</h2>
            <div class="header-actions" id="listHeaderActions"></div>
          </div>
          <div id="listFormArea"></div>
          <div id="listContent"></div>
        </section>

        <aside class="side-column">
          <section class="panel" id="detailPanel">
            <div class="panel-header">
              <h2>详情 &amp; AI 工具</h2>
            </div>
            <div id="detailContent" class="detail-content">
              <p class="empty-hint">点击列表项查看详情，或使用 AI 生成功能。</p>
            </div>
          </section>

          <section class="panel">
            <div class="panel-header">
              <h2>服务状态</h2>
              <span id="workbenchState" class="counter">checking</span>
            </div>
            <div id="statusList" class="status-list"></div>
          </section>

          <section class="panel logs-panel-compact">
            <div class="panel-header">
              <h2>运行日志</h2>
              <span id="logCount" class="counter">0 条</span>
            </div>
            <div id="logsList" class="logs-list compact"></div>
          </section>
        </aside>
      </section>
    </main>

    <div id="modalOverlay" class="modal-overlay hidden">
      <div class="modal">
        <div class="modal-header">
          <h3 id="modalTitle">标题</h3>
          <button type="button" id="modalClose" class="modal-close">&times;</button>
        </div>
        <div id="modalBody" class="modal-body"></div>
      </div>
    </div>

    <div id="confirmOverlay" class="modal-overlay hidden">
      <div class="modal confirm-modal">
        <div class="modal-header">
          <h3 id="confirmTitle">确认</h3>
        </div>
        <div class="modal-body">
          <p id="confirmMessage" style="margin-bottom:16px;font-size:15px;line-height:1.6;"></p>
          <div class="form-actions">
            <button type="button" id="confirmCancel" class="secondary">取消</button>
            <button type="button" id="confirmOk" class="danger">确定</button>
          </div>
        </div>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
